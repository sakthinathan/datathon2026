[pytest]
asyncio_mode = auto
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=../../backend
    --cov-report=term-missing
    --cov-report=html:../../coverage_report
    -p no:warnings

markers =
    auth: Authentication tests
    analytics: Analytics API tests
    predictions: Prediction engine tests
    offenders: Offender profiling tests
    sociology: Sociological insights tests
    financial: Financial crime tests
    chat: Conversational AI tests
    investigator: Case intelligence tests
    e2e: End-to-end browser tests
    slow: Tests taking >2s (may require live backend)
    security: Security and injection prevention tests
